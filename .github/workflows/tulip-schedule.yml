name: Tulip the Trend Scout

on:
  schedule:
    - cron: '0 21 * * 1'
  workflow_dispatch:

jobs:
  run-tulip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-v4-${{ github.run_number }}
          restore-keys: |
            seen-articles-v4-

      - name: Run Tulip the Trend Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python tulip.py

      - name: Save seen articles
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_articles.json
          key: seen-articles-v4-${{ github.run_number }}
```

The only difference is `'0 21 * * 1'` — that `1` at the end means Monday only.

For the **Slack footer** in `tulip.py`, open the file → pencil icon → find this line:
```
"text": "Tulip runs daily at 7am AEST · All entries added to Notion with Newsletter Ready unchecked · React with 👍 to flag for Matty",
```

Replace it with:
```
"text": "Tulip the Trend Scout · Weekly review every Monday 7am AEST · All entries added to Notion · React with 👍 to flag for Matty",
