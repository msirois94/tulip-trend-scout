# ============================================================
# TULIP TREND SCOUT — Scheduled Daily Run
# ============================================================
# This file tells GitHub to run tulip.py every day at 7am AEST.
# You don't need to edit this file unless you want to change
# the schedule.
#
# The schedule uses "cron" format — the line below means:
# "Run at 21:00 UTC every day" (which is 7:00 AM AEST / 8:00 AM AEDT)
#
# To change the time, edit the cron line. Some examples:
#   '0 21 * * *'  = 7:00 AM AEST daily
#   '0 21 * * 1'  = 7:00 AM AEST every Monday only
#   '0 9 * * *'   = 7:00 PM AEST daily
# ============================================================

name: Tulip Trend Scout

on:
  # Run on a daily schedule
  schedule:
    - cron: '0 21 * * *'

  # Also allow manual runs (click "Run workflow" in GitHub Actions tab)
  workflow_dispatch:

jobs:
  run-tulip:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install the libraries Tulip needs
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Restore the list of articles we've already seen
      #         (so we don't process the same article twice)
      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_number }}
          restore-keys: |
            seen-articles-

      # Step 5: Run Tulip
      - name: Run Tulip Trend Scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python tulip.py

      # Step 6: Save the seen articles list for next time
      - name: Save seen articles
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_number }}
